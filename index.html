<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnesPrep</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f2; --surface: #ffffff; --surface2: #f2f1ed; --border: #e8e6e0;
  --text: #1a1816; --text2: #8a8780; --text3: #b8b5b0;
  --blue: #2563eb; --blue-light: #eff6ff;
  --amber: #d97706; --amber-light: #fffbeb; --amber-border: #fde68a;
  --orange: #ea580c; --orange-light: #fff7ed;
  --green: #16a34a; --green-light: #f0fdf4;
  --red: #dc2626; --red-light: #fef2f2; --red-border: #fecaca;
  --purple: #7c3aed; --purple-light: #f5f3ff;
  --radius: 16px; --radius-sm: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }

/* HEADER */
.header { background: var(--surface); padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.header-icon { width: 36px; height: 36px; background: var(--text); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.header-title { font-size: 18px; font-weight: 600; letter-spacing: -0.4px; }
.header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

/* TABS */
.tab-bar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; position: sticky; top: 0; z-index: 20; }
.tab-btn { flex: 1; padding: 0.875rem 0.5rem; border: none; background: none; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* INPUT */
.input-section { padding: 1.25rem; }
.card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; }
.card-inner { padding: 1.25rem; }
.input-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.625rem; display: block; }
.case-textarea { width: 100%; min-height: 110px; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); font-size: 14px; font-family: inherit; line-height: 1.6; resize: none; outline: none; transition: border-color 0.15s, background 0.15s; }
.case-textarea:focus { border-color: var(--text); background: var(--surface); }
.case-textarea::placeholder { color: var(--text3); }
.chips-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin: 1rem 0 0.625rem; display: block; }
.chips-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
.chip { padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface2); color: var(--text2); font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.15s; user-select: none; }
.chip:active { transform: scale(0.96); }
.chip.active { background: var(--text); color: #fff; border-color: var(--text); }
.divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
.analyse-btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); background: var(--text); color: #fff; font-size: 15px; font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.analyse-btn:active { transform: scale(0.98); background: #333; }

/* LOADING */
.loading-wrap { display: none; padding: 2.5rem 1.25rem; text-align: center; }
.loading-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
.loading-dots span { width: 8px; height: 8px; background: var(--text3); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.loading-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
.loading-text { font-size: 13px; color: var(--text2); }

/* ALERTS */
.alerts-section { padding: 0 1.25rem 4px; display: none; }
.alert-banner { background: var(--amber-light); border: 1px solid var(--amber-border); border-radius: var(--radius-sm); padding: 0.875rem 1rem; }
.alert-banner-title { font-size: 11px; font-weight: 600; color: var(--amber); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.alert-item { font-size: 13px; color: #92400e; line-height: 1.6; padding: 3px 0; display: flex; align-items: flex-start; gap: 8px; }
.alert-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); flex-shrink: 0; margin-top: 7px; }

/* RESULT CARDS */
.results-section { padding: 0 1.25rem 2rem; display: none; }
.result-card { border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow-sm); margin-bottom: 10px; overflow: hidden; border-left: 4px solid transparent; animation: slideUp 0.3s cubic-bezier(.4,0,.2,1) both; }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.rc-blue   { border-left-color: var(--blue);   animation-delay: 0.05s; }
.rc-amber  { border-left-color: var(--amber);  animation-delay: 0.10s; }
.rc-purple { border-left-color: var(--purple); animation-delay: 0.15s; }
.rc-orange { border-left-color: var(--orange); animation-delay: 0.20s; }
.rc-green  { border-left-color: var(--green);  animation-delay: 0.25s; }
.result-header { padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.result-header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.result-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.rc-blue   .result-icon { background: var(--blue-light); }
.rc-amber  .result-icon { background: var(--amber-light); }
.rc-purple .result-icon { background: var(--purple-light); }
.rc-orange .result-icon { background: var(--orange-light); }
.rc-green  .result-icon { background: var(--green-light); }
.result-title { font-size: 14px; font-weight: 600; }
.rc-blue   .result-title { color: var(--blue); }
.rc-amber  .result-title { color: var(--amber); }
.rc-purple .result-title { color: var(--purple); }
.rc-orange .result-title { color: var(--orange); }
.rc-green  .result-title { color: var(--green); }
.result-preview { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
.result-chevron { color: var(--text3); font-size: 16px; transition: transform 0.2s; flex-shrink: 0; }
.result-chevron.open { transform: rotate(180deg); }
.result-body { display: none; border-top: 1px solid var(--border); padding: 1rem 1.25rem; }
.result-body.open { display: block; }
.result-item { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.6; color: var(--text); display: flex; align-items: flex-start; gap: 10px; }
.result-item:last-child { border-bottom: none; padding-bottom: 0; }
.result-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
.rc-blue   .result-item-dot { background: var(--blue); }
.rc-amber  .result-item-dot { background: var(--amber); }
.rc-purple .result-item-dot { background: var(--purple); }
.rc-orange .result-item-dot { background: var(--orange); }
.rc-green  .result-item-dot { background: var(--green); }

/* ACTION BUTTONS */
.action-row { padding: 0 1.25rem 0.75rem; display: none; gap: 8px; display: none; }
.action-row.visible { display: flex; }
.btn-secondary { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text2); font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-secondary:active { background: var(--surface2); }
.btn-save { flex: 1; padding: 12px; border: none; border-radius: var(--radius-sm); background: var(--text); color: #fff; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-save:active { background: #333; }
.btn-save.saved { background: var(--green); }

.error-banner { background: var(--red-light); border: 1px solid var(--red-border); border-radius: var(--radius-sm); padding: 0.75rem 1rem; margin: 0 1.25rem 1rem; font-size: 13px; color: var(--red); display: none; }

/* HISTORY PAGE */
.hist-header { padding: 1.25rem 1.25rem 0.75rem; }
.hist-header h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
.hist-header p { font-size: 13px; color: var(--text2); margin-top: 3px; }
.hist-empty { text-align: center; padding: 4rem 2rem; color: var(--text2); font-size: 14px; line-height: 1.7; }
.hist-empty-icon { font-size: 36px; margin-bottom: 12px; }

.hist-card { background: var(--surface); border-radius: var(--radius); margin: 0 1.25rem 10px; box-shadow: var(--shadow-sm); overflow: hidden; }
.hist-card-header { padding: 1rem 1.25rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.hist-card-title { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
.hist-card-meta { font-size: 11px; color: var(--text2); margin-top: 3px; font-family: 'DM Mono', monospace; }
.hist-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
.hist-btn { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); }
.hist-btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
.hist-btn:active { transform: scale(0.96); }
.hist-preview { border-top: 1px solid var(--border); }
.hist-preview-row { display: flex; align-items: flex-start; gap: 8px; padding: 8px 1.25rem; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text2); line-height: 1.5; }
.hist-preview-row:last-child { border-bottom: none; }
.hist-section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.hist-expand-btn { width: 100%; padding: 10px; border: none; background: var(--surface2); color: var(--text2); font-size: 12px; font-family: inherit; cursor: pointer; border-top: 1px solid var(--border); }
.hist-expand-btn:active { background: var(--border); }
.hist-full { display: none; }
.hist-full.open { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🫁</div>
  <div>
    <div class="header-title">AnesPrep</div>
    <div class="header-sub">Anesthesia case planning</div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-new" onclick="showPage('new', this)">New case</button>
  <button class="tab-btn" id="tab-history" onclick="showPage('history', this)">History</button>
</div>

<!-- NEW CASE PAGE -->
<div class="page active" id="page-new">

  <div class="input-section" id="inputSection">
    <div class="card">
      <div class="card-inner">
        <label class="input-label">Case details</label>
        <textarea class="case-textarea" id="caseInput" placeholder="e.g. 65M, AAA repair, HTN, DM2, EF 35%, on metoprolol and warfarin, last echo 2021, smoker, BMI 34..."></textarea>
        <label class="chips-label">Quick add comorbidities</label>
        <div class="chips-wrap">
          <button class="chip" onclick="toggleChip(this,'HTN')">HTN</button>
          <button class="chip" onclick="toggleChip(this,'DM')">DM</button>
          <button class="chip" onclick="toggleChip(this,'CAD')">CAD</button>
          <button class="chip" onclick="toggleChip(this,'CHF')">CHF</button>
          <button class="chip" onclick="toggleChip(this,'AFib')">AFib</button>
          <button class="chip" onclick="toggleChip(this,'CKD')">CKD</button>
          <button class="chip" onclick="toggleChip(this,'OSA')">OSA</button>
          <button class="chip" onclick="toggleChip(this,'GERD')">GERD</button>
          <button class="chip" onclick="toggleChip(this,'Obesity')">Obesity</button>
          <button class="chip" onclick="toggleChip(this,'Smoker')">Smoker</button>
          <button class="chip" onclick="toggleChip(this,'COPD')">COPD</button>
          <button class="chip" onclick="toggleChip(this,'Cirrhosis')">Cirrhosis</button>
          <button class="chip" onclick="toggleChip(this,'Coagulopathy')">Coagulopathy</button>
          <button class="chip" onclick="toggleChip(this,'Anticoagulated')">Anticoagulated</button>
          <button class="chip" onclick="toggleChip(this,'Full stomach')">Full stomach</button>
          <button class="chip" onclick="toggleChip(this,'Difficult airway')">Difficult airway</button>
          <button class="chip" onclick="toggleChip(this,'Renal failure')">Renal failure</button>
          <button class="chip" onclick="toggleChip(this,'Liver disease')">Liver disease</button>
          <button class="chip" onclick="toggleChip(this,'Steroid use')">Steroid use</button>
          <button class="chip" onclick="toggleChip(this,'Pacemaker/ICD')">Pacemaker/ICD</button>
        </div>
        <div class="divider"></div>
        <button class="analyse-btn" onclick="analyseCase()">Analyse case →</button>
      </div>
    </div>
  </div>

  <div class="loading-wrap" id="loadingWrap">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <div class="loading-text">Analysing case...</div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="action-row" id="actionRow">
    <button class="btn-secondary" onclick="resetCase()">← New case</button>
    <button class="btn-save" id="saveBtn" onclick="saveCase()">Save to history</button>
  </div>

  <div class="alerts-section" id="alertsSection"></div>
  <div class="results-section" id="resultsSection"></div>

</div>

<!-- HISTORY PAGE -->
<div class="page" id="page-history">
  <div class="hist-header">
    <h2>History</h2>
    <p>Your saved cases</p>
  </div>
  <div id="historyContent"></div>
</div>

<script>
const SECTIONS = [
  { key: 'preop',       title: 'Pre-op',         icon: '📋', cls: 'rc-blue',   color: '#2563eb' },
  { key: 'intraop',     title: 'Intra-op setup', icon: '🔧', cls: 'rc-amber',  color: '#d97706' },
  { key: 'induction',   title: 'Induction',      icon: '💉', cls: 'rc-purple', color: '#7c3aed' },
  { key: 'maintenance', title: 'Maintenance',     icon: '⚡', cls: 'rc-orange', color: '#ea580c' },
  { key: 'emergence',   title: 'Emergence',       icon: '🟢', cls: 'rc-green',  color: '#16a34a' },
];

const activeChips = new Set();
let currentResult = null;
let currentInput = '';
let currentWeight = null;

function extractWeight(text) {
  // Match patterns like: 80kg, 80 kg, 176lbs, 176 lbs, 176lb
  var kgMatch = text.match(/(\d+\.?\d*)\s*kg/i);
  if (kgMatch) return parseFloat(kgMatch[1]);
  var lbMatch = text.match(/(\d+\.?\d*)\s*lb/i);
  if (lbMatch) return Math.round(parseFloat(lbMatch[1]) * 0.4536 * 10) / 10;
  return null;
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'history') renderHistory();
}

function toggleChip(el, label) {
  if (activeChips.has(label)) { activeChips.delete(label); el.classList.remove('active'); }
  else { activeChips.add(label); el.classList.add('active'); }
}

function toggleResult(id) {
  var body = document.getElementById('rb-' + id);
  var chev = document.getElementById('rc-' + id);
  var prev = document.getElementById('rp-' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
  if (prev) prev.style.display = body.classList.contains('open') ? 'none' : 'block';
}

async function analyseCase() {
  var text = document.getElementById('caseInput').value.trim();
  var chips = Array.from(activeChips);
  if (!text && !chips.length) { showError('Please enter case details or select at least one comorbidity.'); return; }
  document.getElementById('errorBanner').style.display = 'none';
  currentInput = text + (chips.length ? (text ? '\nComorbidities: ' : '') + chips.join(', ') : '');
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('loadingWrap').style.display = 'block';
  document.getElementById('actionRow').classList.remove('visible');

  var sys = 'You are an expert anesthesiologist providing concise, high-yield perioperative guidance for a colleague. Respond ONLY with valid JSON, no markdown, no extra text:\n{"alerts":["high-yield missing workup or critical flags only, max 4, empty array if none"],"preop":{"summary":"one sentence","items":["concise bullet, max 12 words"]},"intraop":{"summary":"one sentence","items":["concise bullet, max 12 words"]},"induction":{"summary":"one sentence","items":["include induction agent and dose, intubation technique, RSI if indicated, airway plan, max 12 words each"]},"maintenance":{"summary":"one sentence","items":["concise bullet, max 12 words"]},"emergence":{"summary":"one sentence","items":["concise bullet, max 12 words"]},"drugs":{"preop":[{"name":"drug name","mgkg":"dose in mg/kg or mcg/kg","mg":null}],"induction":[{"name":"drug name","mgkg":"dose range mg/kg","mg":null}],"maintenance":[{"name":"drug name","mgkg":"infusion rate or dose","mg":null}],"emergence":[{"name":"drug name","mgkg":"dose mg/kg","mg":null}]}}\nFor the drugs section: list only drugs that are specifically relevant to this case — not every possible drug. Use standard clinical doses. The mg field should be null (the app will calculate it from weight if provided). Include premedications in preop, induction agents/paralytic/airway in induction, infusions/volatiles in maintenance, reversal/antiemetics/analgesics in emergence. Keep each list to 3-6 most relevant drugs.\nRules: actionable only. For vascular/cardiac include specific drips and haemodynamic targets. Alerts: only flag things a senior attending would flag. No generic statements.';

  try {
    var res = await fetch('/api/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: sys, content: [{ type: 'text', text: 'Case: ' + currentInput }] })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'API error');
    var json = JSON.parse(data.result.replace(/```json|```/g, '').trim());
    currentResult = json;
    currentWeight = extractWeight(currentInput);
    document.getElementById('loadingWrap').style.display = 'none';
    renderResults(json, currentWeight);
  } catch(err) {
    document.getElementById('loadingWrap').style.display = 'none';
    document.getElementById('inputSection').style.display = 'block';
    showError('Could not analyse — ' + err.message);
  }
}

function showError(msg) {
  var b = document.getElementById('errorBanner');
  b.textContent = msg; b.style.display = 'block';
}

function renderResults(data, weight) {
  weight = weight || null;
  // Alerts
  var alertsSec = document.getElementById('alertsSection');
  if (data.alerts && data.alerts.length) {
    var ahtml = '<div class="alert-banner"><div class="alert-banner-title">⚠ Consider / missing workup</div>';
    data.alerts.forEach(function(a) { ahtml += '<div class="alert-item"><div class="alert-dot"></div>' + a + '</div>'; });
    ahtml += '</div>';
    alertsSec.innerHTML = ahtml;
    alertsSec.style.display = 'block';
  } else { alertsSec.style.display = 'none'; }

  // Cards
  var html = '';
  SECTIONS.forEach(function(s, idx) {
    var d = data[s.key];
    if (!d) return;
    var itemsHtml = (d.items || []).map(function(item) {
      return '<div class="result-item"><div class="result-item-dot"></div><div>' + item + '</div></div>';
    }).join('');
    html += '<div class="result-card ' + s.cls + '">' +
      '<div class="result-header" onclick="toggleResult(' + idx + ')">' +
        '<div class="result-header-left">' +
          '<div class="result-icon">' + s.icon + '</div>' +
          '<div style="min-width:0">' +
            '<div class="result-title">' + s.title + '</div>' +
            '<div class="result-preview" id="rp-' + idx + '" style="display:none">' + (d.summary || '') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="result-chevron open" id="rc-' + idx + '">▾</div>' +
      '</div>' +
      '<div class="result-body open" id="rb-' + idx + '">' + itemsHtml + '</div>' +
    '</div>';
  });

  // Drug dosing card
  if (data.drugs) { html += renderDrugCard(data.drugs, weight); }

  var rs = document.getElementById('resultsSection');
  rs.innerHTML = html;
  rs.style.display = 'block';

  var ar = document.getElementById('actionRow');
  ar.classList.add('visible');

  var saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = 'Save to history';
  saveBtn.className = 'btn-save';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDrugCard(drugs, weight) {
  var groups = [
    { key: 'preop',       label: 'Pre-op' },
    { key: 'induction',   label: 'Induction' },
    { key: 'maintenance', label: 'Maintenance' },
    { key: 'emergence',   label: 'Emergence' },
  ];

  // Always ensure core drugs are present — do this BEFORE hasAny check
  if (!drugs.induction) drugs.induction = [];
  if (!drugs.emergence) drugs.emergence = [];

  var hasPropo = drugs.induction.some(function(d) { return d.name.toLowerCase().indexOf('propofol') !== -1; });
  if (!hasPropo) drugs.induction.unshift({ name: 'Propofol', mgkg: '1.5–2.5', mg: null });

  var hasSux = drugs.induction.some(function(d) { return d.name.toLowerCase().indexOf('succinylcholine') !== -1 || d.name.toLowerCase().indexOf('sux') !== -1; });
  if (!hasSux) drugs.induction.push({ name: 'Succinylcholine', mgkg: '1–1.5', mg: null });

  var hasSugam = drugs.emergence.some(function(d) { return d.name.toLowerCase().indexOf('sugammadex') !== -1; });
  if (!hasSugam) drugs.emergence.unshift({ name: 'Sugammadex', mgkg: '2–4', mg: null });

  var hasNeo = drugs.emergence.some(function(d) { return d.name.toLowerCase().indexOf('neostigmine') !== -1 || d.name.toLowerCase().indexOf('glycopyrrolate') !== -1; });
  if (!hasNeo) {
    drugs.emergence.push({ name: 'Glycopyrrolate', mgkg: '0.01', mg: null });
    drugs.emergence.push({ name: 'Neostigmine', mgkg: '0.04', mg: null });
  }

  var hasAny = groups.some(function(g) { return drugs[g.key] && drugs[g.key].length; });
  if (!hasAny) return '';

  var inner = '';

  groups.forEach(function(g) {
    var list = drugs[g.key];
    if (!list || !list.length) return;
    inner += '<div style="margin-bottom:12px;">' +
      '<div style="font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">' + g.label + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr auto auto;gap:0 10px;">' +
      '<div style="font-size:10px;color:var(--text3);padding-bottom:4px;">Drug</div>' +
      '<div style="font-size:10px;color:var(--text3);text-align:right;padding-bottom:4px;">mg/kg</div>' +
      '<div style="font-size:10px;color:var(--text3);text-align:right;padding-bottom:4px;">' + (weight ? weight + ' kg' : 'ref') + '</div>';

    list.forEach(function(drug) {
      var mgDisplay = '—';
      if (weight && drug.mgkg) {
        var rangeMatch = drug.mgkg.match(/([\d.]+)\s*[-–]\s*([\d.]+)/);
        var singleMatch = drug.mgkg.match(/([\d.]+)/);
        if (rangeMatch) {
          var lo = Math.round(parseFloat(rangeMatch[1]) * weight);
          var hi = Math.round(parseFloat(rangeMatch[2]) * weight);
          mgDisplay = lo + '–' + hi + ' mg';
        } else if (singleMatch) {
          var mg = Math.round(parseFloat(singleMatch[1]) * weight * 10) / 10;
          mgDisplay = mg + ' mg';
        }
      } else if (!weight) {
        mgDisplay = '—';
      }
      var borderStyle = 'border-top:1px solid var(--border);padding:5px 0;';
      inner += '<div style="font-size:13px;font-weight:500;color:var(--text);' + borderStyle + '">' + drug.name + '</div>' +
        '<div style="font-size:12px;color:var(--text2);text-align:right;' + borderStyle + 'font-family:\'DM Mono\',monospace;">' + (drug.mgkg || '—') + '</div>' +
        '<div style="font-size:12px;font-weight:600;color:var(--text);text-align:right;' + borderStyle + 'font-family:\'DM Mono\',monospace;">' + mgDisplay + '</div>';
    });
    inner += '</div></div>';
  });

  var weightSubtitle = weight ? 'Calculated for ' + weight + ' kg' : 'No weight detected — showing mg/kg reference only';
  return '<div class="result-card" style="border-left:4px solid #64748b;animation-delay:0.3s;">' +
    '<div class="result-header" onclick="toggleResult(99)">' +
      '<div class="result-header-left">' +
        '<div class="result-icon" style="background:#f1f5f9;">💊</div>' +
        '<div style="min-width:0">' +
          '<div class="result-title" style="color:#475569;">Drug doses</div>' +
          '<div style="font-size:12px;color:var(--text2);margin-top:2px;">' + weightSubtitle + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="result-chevron open" id="rc-99">▾</div>' +
    '</div>' +
    '<div class="result-body open" id="rb-99" style="padding:1rem 1.25rem;">' + inner + '</div>' +
  '</div>';
}

function saveCase() {
  if (!currentResult) return;
  var history = JSON.parse(localStorage.getItem('anes_history') || '[]');
  var title = currentInput.split('\n')[0].substring(0, 80);
  var now = new Date();
  var dateLabel = now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  var timeLabel = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  history.unshift({
    id: Date.now(),
    title: title,
    dateLabel: dateLabel,
    timeLabel: timeLabel,
    input: currentInput,
    result: currentResult
  });
  localStorage.setItem('anes_history', JSON.stringify(history));
  var saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = '✓ Saved';
  saveBtn.className = 'btn-save saved';
}

function resetCase() {
  currentResult = null;
  currentInput = '';
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('alertsSection').style.display = 'none';
  document.getElementById('actionRow').classList.remove('visible');
  document.getElementById('errorBanner').style.display = 'none';
  document.getElementById('alertsSection').innerHTML = '';
  document.getElementById('resultsSection').innerHTML = '';
  document.getElementById('caseInput').value = '';
  activeChips.clear();
  document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderHistory() {
  var container = document.getElementById('historyContent');
  var history = [];
  try { history = JSON.parse(localStorage.getItem('anes_history') || '[]'); } catch(e) {}

  if (!history.length) {
    container.innerHTML = '<div class="hist-empty"><div class="hist-empty-icon">📂</div><div>No saved cases yet.<br>Analyse a case and tap<br><strong>Save to history</strong> to store it here.</div></div>';
    return;
  }

  var html = '';
  history.forEach(function(entry, idx) {
    // Build a short preview — first item from each section
    var previewHtml = '';
    SECTIONS.forEach(function(s) {
      var d = entry.result[s.key];
      if (d && d.summary) {
        previewHtml += '<div class="hist-preview-row">' +
          '<div class="hist-section-dot" style="background:' + s.color + '"></div>' +
          '<div><strong>' + s.title + '</strong> — ' + d.summary + '</div>' +
          '</div>';
      }
    });

    // Full cards (hidden by default)
    var fullHtml = '';
    if (entry.result.alerts && entry.result.alerts.length) {
      fullHtml += '<div style="padding:0.75rem 1.25rem;background:var(--amber-light);border-bottom:1px solid var(--amber-border)">';
      entry.result.alerts.forEach(function(a) {
        fullHtml += '<div style="font-size:12px;color:#92400e;padding:2px 0;display:flex;gap:6px;align-items:flex-start"><span>⚠</span>' + a + '</div>';
      });
      fullHtml += '</div>';
    }
    SECTIONS.forEach(function(s) {
      var d = entry.result[s.key];
      if (!d) return;
      fullHtml += '<div style="border-bottom:1px solid var(--border)">' +
        '<div style="padding:0.75rem 1.25rem;display:flex;align-items:center;gap:8px;">' +
          '<div style="width:6px;height:6px;border-radius:50%;background:' + s.color + ';flex-shrink:0"></div>' +
          '<div style="font-size:13px;font-weight:600;color:' + s.color + '">' + s.title + '</div>' +
        '</div>' +
        '<div style="padding:0 1.25rem 0.75rem">' +
        (d.items || []).map(function(item) {
          return '<div style="font-size:12px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;line-height:1.5">' +
            '<div style="width:5px;height:5px;border-radius:50%;background:' + s.color + ';flex-shrink:0;margin-top:6px"></div>' + item + '</div>';
        }).join('') +
        '</div></div>';
    });

    html += '<div class="hist-card" id="hcard-' + idx + '">' +
      '<div class="hist-card-header">' +
        '<div>' +
          '<div class="hist-card-title">' + entry.title + '</div>' +
          '<div class="hist-card-meta">' + entry.dateLabel + ' · ' + entry.timeLabel + '</div>' +
        '</div>' +
        '<div class="hist-card-actions">' +
          '<button class="hist-btn" onclick="deleteCase(' + idx + ')">Delete</button>' +
          '<button class="hist-btn primary" onclick="loadCase(' + idx + ')">Load</button>' +
        '</div>' +
      '</div>' +
      '<div class="hist-preview">' + previewHtml + '</div>' +
      '<button class="hist-expand-btn" id="hexpbtn-' + idx + '" onclick="toggleHistFull(' + idx + ')">Show full guidance ▾</button>' +
      '<div class="hist-full" id="hfull-' + idx + '">' + fullHtml + '</div>' +
    '</div>';
  });

  container.innerHTML = html;
}

function toggleHistFull(idx) {
  var full = document.getElementById('hfull-' + idx);
  var btn = document.getElementById('hexpbtn-' + idx);
  full.classList.toggle('open');
  btn.textContent = full.classList.contains('open') ? 'Hide full guidance ▴' : 'Show full guidance ▾';
}

function loadCase(idx) {
  var history = JSON.parse(localStorage.getItem('anes_history') || '[]');
  var entry = history[idx];
  if (!entry) return;
  currentResult = entry.result;
  currentInput = entry.input;
  currentWeight = extractWeight(entry.input);
  // Switch to new case tab and show results
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-new').classList.add('active');
  document.getElementById('tab-new').classList.add('active');
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('caseInput').value = entry.input;
  renderResults(entry.result, currentWeight);
  var saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = '✓ Already saved';
  saveBtn.className = 'btn-save saved';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteCase(idx) {
  if (!confirm('Delete this case?')) return;
  var history = JSON.parse(localStorage.getItem('anes_history') || '[]');
  history.splice(idx, 1);
  localStorage.setItem('anes_history', JSON.stringify(history));
  renderHistory();
}
</script>
</body>
</html>
